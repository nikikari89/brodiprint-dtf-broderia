<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявката е изпратена | BrodiPrint</title>
  <meta name="theme-color" content="#111111">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #101010, #2c2c2c);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #111;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,0.38);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #555;
      line-height: 1.5;
    }

    a {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      border-radius: 14px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Заявката е изпратена</h1>
    <p>Благодарим ви. Ще прегледаме файла и данните и ще се свържем с вас за потвърждение на финалната цена.</p>
    <a href="index.html">Обратно към калкулатора</a>
  </main>
</body>
</html>
